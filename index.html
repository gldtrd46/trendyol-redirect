<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Just a moment...</title>
  <meta property="og:title" content="Just a moment..." />
  <meta property="og:description" content="" />
  <meta name="robots" content="noindex, nofollow" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #F27A1A;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .buttons { display: none; flex-direction: column; gap: 12px; margin-top: 20px; width: 100%; max-width: 300px; }
    .btn {
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
    }
    .btn-white { background: white; color: #F27A1A; }
    .btn-outline { background: transparent; color: white; border: 2px solid white; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="message">Just a moment...</p>
  <div class="buttons" id="buttons">
    <a class="btn btn-white" id="mainBtn" href="#">Open Page</a>
  </div>

  <script>
    // ty.gl link handles app routing, store fallback, and web fallback natively
    const parts = ["https://ty", ".gl/otkiqrb935h5e"];
    const dest = parts.join("");

    document.getElementById("mainBtn").href = dest;

    window.location = dest;

    setTimeout(() => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").textContent = "Tap below to continue.";
      document.getElementById("buttons").style.display = "flex";
    }, 2000);
  </script>
</body>
</html>
