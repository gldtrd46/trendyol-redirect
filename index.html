<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Trendyol</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #F27A1A;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 300px;
    }
    .btn {
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
    }
    .btn-primary {
      background: white;
      color: #F27A1A;
      border: 3px solid white;
      box-shadow: 0 10px 24px rgba(0,0,0,0.24);
      font-size: 20px;
      padding: 20px 18px;
      transform: scale(1.04);
    }
    .btn-outline { background: transparent; color: white; border: 2px solid white; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Apasa link-ul pentru a deschide in Trendyol.</p>
  <div class="buttons">
    <a class="btn btn-primary" id="trendyolBtn" href="#">
      Deschide in Trendyol
    </a>
    <a class="btn btn-outline" id="storeBtn" href="#">
      Descarca Trendyol App
    </a>
  </div>

  <script>
    const defaultTrendyolLink = "https://ty.gl/z623r56tfisvc";

    function getTrendyolLink() {
      const prefix = "?url=";
      if (!window.location.search.startsWith(prefix)) return defaultTrendyolLink;

      const pastedUrl = decodeURIComponent(window.location.search.slice(prefix.length));
      try {
        const parsedUrl = new URL(pastedUrl);
        return parsedUrl.protocol === "https:" || parsedUrl.protocol === "http:"
          ? parsedUrl.href
          : defaultTrendyolLink;
      } catch {
        return defaultTrendyolLink;
      }
    }

    const trendyolLink = getTrendyolLink();
    const appStoreUrl = "https://apps.apple.com/app/trendyol/id524362642";
    const playStoreUrl = "https://play.google.com/store/apps/details?id=trendyol.com.tr";

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    document.getElementById("trendyolBtn").href = trendyolLink;

    const storeBtn = document.getElementById("storeBtn");
    if (isIOS) storeBtn.href = appStoreUrl;
    else if (isAndroid) storeBtn.href = playStoreUrl;
    else storeBtn.style.display = "none";
  </script>
</body>
</html>
