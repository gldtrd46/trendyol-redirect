<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Opening Trendyol...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #F27A1A;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .buttons {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 20px;
      width: 100%;
      max-width: 300px;
    }

    .btn {
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
    }

    .btn-white {
      background: white;
      color: #F27A1A;
    }

    .btn-outline {
      background: transparent;
      color: white;
      border: 2px solid white;
    }
  </style>
</head>

<body>
  <div class="spinner" id="spinner"></div>
  <p id="message">Opening in Trendyol...</p>

  <div class="buttons" id="buttons">
    <a class="btn btn-white" id="browserBtn" href="#">
      View in Browser
    </a>

    <a class="btn btn-outline" id="storeBtn" href="#">
      Download Trendyol App
    </a>
  </div>

  <script>
    const productId = "1100370216";

    const baseProductUrl =
      "https://www.trendyol.com/en/magarde/permium-lace-crew-neck-blouse-black-p-1100370216";

    const appStoreUrl = "https://apps.apple.com/app/trendyol/id524362642";
    const playStoreUrl = "https://play.google.com/store/apps/details?id=trendyol.com.tr";

    const trackingParams = {
      choiceNNEnabled: "true",
      boutiqueId: "48",
      merchantId: "968",

      adjust_t: "ai34kpn_77icnip",
      adjust_creative: productId,
      adjust_campaign: "b2c_aff_pdp_de",
      adjust_adgroup: "183722368",

      utm_term: productId,
      utm_campaign: "183722368",
      utm_source: "influencer",
      utm_medium: "b2c_aff_pdp_de",

      link_userID: "183722368",
      link_contentid: productId,

      timestamp: Math.floor(Date.now() / 1000).toString()
    };

    function buildUrl(baseUrl, params) {
      const url = new URL(baseUrl);

      Object.entries(params).forEach(([key, value]) => {
        url.searchParams.set(key, value);
      });

      return url.toString();
    }

    function buildDeepLink() {
      const params = new URLSearchParams({
        Page: "Product",
        ContentId: productId,
        ...trackingParams
      });

      return ty://?${params.toString()};
    }

    const trackedProductUrl = buildUrl(baseProductUrl, trackingParams);
    const deepLink = buildDeepLink();

    const browserBtn = document.getElementById("browserBtn");
    const storeBtn = document.getElementById("storeBtn");

    browserBtn.href = trackedProductUrl;

    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    if (isIOS) {
      storeBtn.href = appStoreUrl;
    } else if (isAndroid) {
      storeBtn.href = playStoreUrl;
    } else {
      storeBtn.style.display = "none";
    }

    window.location.href = deepLink;

    setTimeout(() => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").textContent =
        "Couldn't open the Trendyol app.";

      document.getElementById("buttons").style.display = "flex";
    }, 2000);
  </script>
</body>
</html>
