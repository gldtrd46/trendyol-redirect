<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Opening Trendyol...</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #F27A1A;
      color: white;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .buttons { display: none; flex-direction: column; gap: 12px; margin-top: 20px; width: 100%; max-width: 300px; }
    .btn {
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      text-decoration: none;
      text-align: center;
    }
    .btn-white { background: white; color: #F27A1A; }
    .btn-outline { background: transparent; color: white; border: 2px solid white; }
  </style>
</head>
<body>
  <div class="spinner" id="spinner"></div>
  <p id="message">Opening in Trendyol...</p>
  <div class="buttons" id="buttons">
    <a class="btn btn-white" href="https://www.trendyol.com/ro/magarde/bluza-premium-din-dantela-cu-decolteu-rotund-negru-p-1100370216?boutiqueId=48&merchantId=968&adjust_t=ai34kpn_77icnip&adjust_creative=1100370216&timestamp=1779711013&adjust_campaign=b2c_aff_pdp_de&link_userID=183722368&adjust_adgroup=183722368&utm_term=1100370216&link_contentid=1100370216&utm_campaign=183722368&utm_source=influencer&utm_medium=b2c_aff_pdp_de">
      View in Browser
    </a>
    <a class="btn btn-outline" id="storeBtn" href="#">
      Download Trendyol App
    </a>
  </div>

  <script>
    const productUrl = "https://www.trendyol.com/ro/magarde/bluza-premium-din-dantela-cu-decolteu-rotund-negru-p-1100370216?boutiqueId=48&merchantId=968&adjust_t=ai34kpn_77icnip&adjust_creative=1100370216&timestamp=1779711013&adjust_campaign=b2c_aff_pdp_de&link_userID=183722368&adjust_adgroup=183722368&utm_term=1100370216&link_contentid=1100370216&utm_campaign=183722368&utm_source=influencer&utm_medium=b2c_aff_pdp_de";
    const deepLink = "ty://?Page=Product&ContentId=1100370216";
    const appStoreUrl = "https://apps.apple.com/app/trendyol/id524362642";
    const playStoreUrl = "https://play.google.com/store/apps/details?id=trendyol.com.tr";

    // Detect platform
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isAndroid = /android/i.test(navigator.userAgent);

    // Set correct store link
    const storeBtn = document.getElementById("storeBtn");
    if (isIOS) storeBtn.href = appStoreUrl;
    else if (isAndroid) storeBtn.href = playStoreUrl;
    else storeBtn.style.display = "none"; // Hide on desktop

    // Try opening the app
    window.location = deepLink;

    // If app not installed, show fallback buttons after 2s
    setTimeout(() => {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("message").textContent = "Couldn't open the Trendyol app.";
      document.getElementById("buttons").style.display = "flex";
    }, 2000);

    // If app opened successfully, the page goes to background
    // and the timeout won't visibly fire — so this is safe
  </script>
</body>
</html>
